name: CI
on: [push, pull_request]
env:
  GODOT_VERSION: 4.6.2
  GODOT_LINUX_SHA256: 30e6b6d141f0cd5bebd629ad1d0ef1324e60091bb20662d026b402ba58c59937
  GODOT_WINDOWS_SHA256: 14293422efb54b24a51f79d4cb55ab4001ef3d936e064a6c8af32e1f984024be
jobs:
  verify:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server
        working-directory: server
        run: npm ci
      - name: Architecture
        run: node --test tests/architecture/*.test.mjs
      - name: Server tests
        working-directory: server
        run: npm test -- --run
      - name: Typecheck and build
        working-directory: server
        run: npm run typecheck && npm run build
      - name: Offline documentation integrity
        working-directory: server
        run: npm run docs:check
      - name: Install Godot (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          echo "${GODOT_LINUX_SHA256}  godot.zip" | sha256sum --check --strict
          unzip -q godot.zip -d .godot
          echo "GODOT_PATH=$PWD/.godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" >> "$GITHUB_ENV"
      - name: Install Godot (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/$env:GODOT_VERSION-stable/Godot_v$env:GODOT_VERSION-stable_win64.exe.zip" -OutFile godot.zip
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath godot.zip).Hash.ToLowerInvariant()
          if ($actual -ne $env:GODOT_WINDOWS_SHA256) { throw "Godot archive SHA-256 mismatch: expected $env:GODOT_WINDOWS_SHA256, got $actual" }
          Expand-Archive godot.zip -DestinationPath .godot
          "GODOT_PATH=$pwd\.godot\Godot_v$env:GODOT_VERSION-stable_win64.exe" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Plugin smoke
        run: node tests/godot/run-smoke.mjs
      - name: Live editor acceptance
        env:
          GODOT_PROJECT_PATH: ${{ github.workspace }}/tests/fixtures/godot_project
        working-directory: server
        run: npm run test:live
      - name: Live Phase 3 acceptance
        env:
          GODOT_PROJECT_PATH: ${{ github.workspace }}/tests/fixtures/godot_project
        working-directory: server
        run: npm run test:live:phase3
      - name: Live Phase 4 acceptance
        env:
          GODOT_PROJECT_PATH: ${{ github.workspace }}/tests/fixtures/godot_project
        working-directory: server
        run: npm run test:live:phase4
      - name: Live Phase 5 acceptance (Linux)
        if: runner.os == 'Linux'
        env:
          GODOT_PROJECT_PATH: ${{ github.workspace }}/tests/fixtures/godot_project
        working-directory: server
        shell: bash
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" npm run test:live:phase5
      - name: Live Phase 5 acceptance (Windows)
        if: runner.os == 'Windows'
        env:
          GODOT_PROJECT_PATH: ${{ github.workspace }}/tests/fixtures/godot_project
        working-directory: server
        run: npm run test:live:phase5
